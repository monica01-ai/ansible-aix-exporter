---
# Ansible Playbook: Upgrade AIX monitoring exporter
# Migrates from legacy prom_exporter_aix.rte to aix-exporter
# Target: AIX 7.2+ servers
#
# Requirements:
#   ansible-galaxy collection install ibm.power_aix community.general
#
# Usage:
#   ansible-playbook -i inventory upgrade-aix-exporter.yml

- name: Upgrade AIX exporter
  hosts: aix_servers
  serial: 2
  max_fail_percentage: 25
  gather_facts: true
  become: true

  vars:
    bff_file: "aix-exporter.1.0.0.2.bff"
    bff_src: "files/{{ bff_file }}"
    bff_tmpdir: "/tmp/aix-exporter-install"
    old_fileset: "prom_exporter_aix.rte"
    old_service: "prom_exporter"
    old_process: "prom_exporter"
    new_fileset: "aix-exporter.rte"
    new_service: "aix-exporter"
    new_process: "aix-exporter"

  tasks:
    - meta: end_play
      when: ansible_distribution != "AIX" or ansible_distribution_version not in ["7.1", "7.2", "7.3"]

    # ---- Gather installed filesets ----
    - name: Gather LPP facts (targeted)
      ibm.power_aix.lpp_facts:
        filesets:
          - "{{ old_fileset }}"
          - "{{ new_fileset }}"

    - name: Set fileset flags
      set_fact:
        old_installed: "{{ old_fileset in ansible_facts.get('lpp', {}) }}"
        new_installed: "{{ new_fileset in ansible_facts.get('lpp', {}) }}"

    - name: Check if aix-exporter process exists
      shell: ps -ef | grep -v grep | grep aix-exporter
      register: new_proc_check
      changed_when: false
      failed_when: false

    - name: Set running flag
      set_fact:
        new_exporter_running: "{{ new_proc_check.rc == 0 }}"

    - name: Get installed version
      shell: lslpp -l {{ new_fileset }} | awk '/{{ new_fileset }}/{print $2}'
      register: installed_version
      changed_when: false
      failed_when: false
      when: new_installed

    - name: Set target version from BFF filename
      set_fact:
        target_version: "{{ bff_file | regex_replace('^aix-exporter\\.(.*)\\.bff$', '\\1') }}"

    - name: Skip if target version already installed and running
      meta: end_play
      when:
        - new_installed
        - new_exporter_running
        - installed_version.stdout | default('') == target_version

    # ---- Prepare staging directory ----
    - name: Create temporary install directory
      file:
        path: "{{ bff_tmpdir }}"
        state: directory
        mode: "0755"

    - name: Copy BFF package to staging directory
      copy:
        src: "{{ bff_src }}"
        dest: "{{ bff_tmpdir }}/{{ bff_file }}"
        mode: "0644"

    # ---- Handle legacy prom_exporter ----
    - name: Stop legacy service
      ansible.builtin.service:
        name: "{{ old_service }}"
        state: stopped
      when: old_installed
      failed_when: false

    - name: Check if legacy process exists
      shell: "ps -ef | grep -v grep | grep {{ old_process }}"
      register: old_proc_check
      changed_when: false
      failed_when: false
      when: old_installed

    - name: Kill legacy process if running
      shell: "ps -ef | grep -v grep | grep {{ old_process }} | awk '{print $2}' | xargs -I{} kill -9 {}"
      when: old_installed and old_proc_check.rc == 0
      changed_when: true
      failed_when: false

    - name: Uninstall legacy fileset
      community.general.installp:
        name: "{{ old_fileset }}"
        state: absent
      when: old_installed
      register: uninstall_legacy

    - name: Fail if legacy uninstall failed
      fail:
        msg: "Cannot uninstall {{ old_fileset }}"
      when: old_installed and uninstall_legacy is failed

    # ---- Handle existing aix-exporter (upgrade case) ----
    - name: Stop aix-exporter service before upgrade
      ansible.builtin.service:
        name: "{{ new_service }}"
        state: stopped
      when: new_installed
      failed_when: false
    
    - name: Check if new process still running
      shell: "ps -ef | grep -v grep | grep {{ new_process }}"
      register: new_proc_recheck
      when: new_installed
      changed_when: false
      failed_when: false

    - name: Force kill if still running
      shell: "kill -9 $(ps -ef | grep -v grep | grep {{ new_process }} | awk '{print $2}')"
      when: new_installed and new_proc_recheck.rc == 0


    # ---- Install new version ----
    - name: Install aix-exporter BFF
      community.general.installp:
        name: "{{ new_fileset }}"
        repository_path: "{{ bff_tmpdir }}"
        accept_license: true
        state: present
      register: install_result

    - name: Display install result
      debug:
        var: install_result

    # ---- Start service ----
    - name: Start aix-exporter service
      ansible.builtin.service:
        name: "{{ new_service }}"
        state: started

    - name: Verify service is running
      shell: lssrc -s {{ new_service }}
      register: service_status
      changed_when: false

    - name: Display service status
      debug:
        var: service_status.stdout_lines

    # ---- Cleanup ----
    - name: Remove staging directory
      file:
        path: "{{ bff_tmpdir }}"
        state: absent

    # ---- Verify install ----
    - name: Verify installed version
      shell: lslpp -l {{ new_fileset }}
      register: version_check
      changed_when: false

    - name: Display installed version
      debug:
        var: version_check.stdout_lines

    - name: Health check - wait for metrics endpoint
      wait_for:
        host: localhost
        port: 9100
        timeout: 15


- name: Deployment summary
  hosts: aix_servers
  gather_facts: false
  become: true
  tasks:
    - name: Check final status
      shell: "lslpp -l aix-exporter.rte 2>/dev/null | awk '/aix-exporter.rte/{print $2}'"
      register: final_ver
      changed_when: false
      failed_when: false

    - name: Report
      debug:
        msg: "{{ inventory_hostname }}: {{ final_ver.stdout | default('NOT INSTALLED') }}"
